name = "CLM"
uuid = "4245f2e0-edff-455b-b31b-2767da28c542"
version = "0.1.0"
authors = ["Darri Eythorsson <dareyt@gmail.com>"]
description = "A differentiable Julia port of the Community Land Model (CLM5)"

[deps]
Adapt = "79e6a3ab-5dfb-504d-930d-738a2a938a0e"
Atomix = "a9b6321e-bd34-4604-b9c9-b65b8de01458"
Dates = "ade2ca70-3891-5945-98fb-dc099432e06a"
Enzyme = "7da242da-08ed-463a-9acd-ee780be4f1d9"
ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"
JSON = "682c06a0-de6a-54ab-a142-c8b1cf79cde6"
KernelAbstractions = "63c18a36-062a-441e-b654-da1e3ab1ce7c"
LinearAlgebra = "37e2e46d-f89d-539d-b4ee-838fcccc9c8e"
MPI = "da04e1cc-30fd-572f-bb4f-1f8673147195"
NCDatasets = "85f8d34a-cbdd-5861-8df4-14fed0d494ab"

# Optional GPU backends — loaded ONLY when the user has CUDA/AMDGPU installed.
# These are NOT hard dependencies: `using CLM` works with neither present. Each
# triggers a package extension (see [extensions]) that installs its device
# adaptor + KernelAbstractions backend into the centralized backend registry
# (src/infrastructure/backend.jl).
[weakdeps]
CUDA = "052768ef-5323-5732-b1bb-66c8b64840ba"
AMDGPU = "21141c5a-9bdb-4563-92ae-f87d6854732e"

[extensions]
CLMCUDAExt = "CUDA"
CLMAMDGPUExt = "AMDGPU"

[compat]
Adapt = "4.6.0"
AMDGPU = "1"
Atomix = "1"
CUDA = "5"
Enzyme = "0.13.152"
ForwardDiff = "1.3"
JSON = "1.4"
KernelAbstractions = "0.9.41"
MPI = "0.20.26"
NCDatasets = "0.14"
julia = "1.10"

[extras]
ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

[targets]
test = ["ForwardDiff", "Test"]
